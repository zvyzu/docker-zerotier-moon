name: Docker Zerotier Moon Server

on:
  #   push:
  #     branches: [ main, master ]
  #     tags: [ 'v*' ]
  #   pull_request:
  #     branches: [ main, master ]
  workflow_dispatch:
    inputs:
      ZT_VERSION:
        description: "ZeroTier (Version: 1.14.2)"
        required: true
        default: "1.14.2"
      USE_LATEST_TAG:
        description: "latest"
        type: boolean
        required: true
        default: true

env:
  REGISTRY_DOCKER: dhi.io
  REGISTRY_GITHUB: ghcr.io
  IMAGE_NAME_DOCKER: vyzu/zerotier-moon
  IMAGE_NAME_GITHUB: ${{ github.repository_owner }}/zerotier-moon

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: QEMU Emulation
        uses: docker/setup-qemu-action@v2

      - name: Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Generate Metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: |
            ${{ env.REGISTRY_DOCKER }}/${{ env.IMAGE_NAME_DOCKER }}
            ${{ env.REGISTRY_GITHUB }}/${{ env.IMAGE_NAME_GITHUB }}
          tags: |
            type=raw,value=${{ github.event.inputs.ZT_VERSION  }}
            type=raw,value=latest,enable=${{ github.event.inputs.USE_LATEST_TAG == 'true' }}

      - name: DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY_DOCKER }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GITHUB }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ZT_VERSION=${{ github.event.inputs.ZT_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
